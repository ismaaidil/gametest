<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyondsoft Street-Race</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            <div id="score">Score: <span id="scoreValue">0</span></div>
            <div id="highScore">Best: <span id="highScoreValue">0</span></div>
            <div id="speed">Speed: <span id="speedValue">0</span> km/h</div>
        </div>
        <div id="startScreen" class="overlay">
            <h1>🏎️ Beyondsoft Street-Race</h1>
            <p>Use ← → arrow keys to move</p>
            <p>Dodge the obstacles!</p>
            <p class="high-score-display">High Score: <span id="startHighScore">0</span></p>
            <button id="startButton">START GAME</button>
            <br>
            <br>
            <br>
            <br>
            <br>
            <p>Developed by Isma</p>
        </div>
        <div id="gameOverScreen" class="overlay" style="display: none;">
            <h1>GAME OVER</h1>
            <p>Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="finalHighScore">0</span></p>
            <p id="newHighScoreMessage" style="display: none; color: #ffd700; font-size: 24px;">🏆 NEW HIGH SCORE! 🏆</p>
            <button id="restartButton">PLAY AGAIN</button>
            <button id="homeButton">🏠 HOME</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
